<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AI-THON 1.0 - Remote Inaugurate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #0a0a1a 0%, #050505 100%);
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      opacity: 0.15;
    }
    .blob-1 { width: 300px; height: 300px; background: #2563eb; top: 10%; left: 20%; }
    .blob-2 { width: 250px; height: 250px; background: #7c3aed; bottom: 15%; right: 10%; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      border: 1px solid rgba(37, 99, 235, 0.35);
      background: rgba(37, 99, 235, 0.08);
      color: #60a5fa;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 30%, #60a5fa 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem;
      margin-bottom: 3rem;
      max-width: 280px;
    }

    .btn-inaugurate {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 40% 35%, #3b82f6, #1d4ed8 70%);
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      box-shadow:
        0 0 40px rgba(37, 99, 235, 0.4),
        0 0 80px rgba(37, 99, 235, 0.15),
        inset 0 -4px 12px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, box-shadow 0.3s ease;
      z-index: 10;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-inaugurate:active {
      transform: scale(0.93);
      box-shadow:
        0 0 20px rgba(37, 99, 235, 0.5),
        inset 0 4px 12px rgba(0,0,0,0.4);
    }

    .pulse-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid rgba(37, 99, 235, 0.3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2.5s ease-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    .btn-wrap { position: relative; margin-bottom: 2.5rem; }

    .btn-inaugurate.sent {
      background: radial-gradient(circle at 40% 35%, #22c55e, #15803d 70%);
      box-shadow:
        0 0 40px rgba(34,197,94,0.4),
        0 0 80px rgba(34,197,94,0.15),
        inset 0 -4px 12px rgba(0,0,0,0.3);
      pointer-events: none;
    }
    .btn-inaugurate.sent + .pulse-ring { animation: none; border-color: rgba(34,197,94,0.3); }

    .status {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      min-height: 1.2em;
      transition: color 0.3s;
    }
    .status.success { color: #4ade80; }
    .status.error   { color: #f87171; }

    .footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.55rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="badge">&#128225; Remote Control</div>
  <h1>AI-THON 1.0</h1>      
  <p class="subtitle">Tap the button below to inaugurate the event on the big screen</p>

  <div class="btn-wrap">
    <button class="btn-inaugurate" id="inaugurateBtn" onclick="inaugurate()">
      Inaugurate
    </button>
    <div class="pulse-ring"></div>
  </div>

  <p class="status" id="status">Waiting for your tap&hellip;</p>

  <div class="footer">Dept. of AI &amp; Data Science</div>

  <script>
    // Must match the NTFY_CHANNEL in App.tsx
    var NTFY_CHANNEL = "aithon1-inaugurate-2026";

    async function inaugurate() {
      var btn = document.getElementById('inaugurateBtn');
      var status = document.getElementById('status');

      btn.classList.add('sent');
      btn.textContent = 'Sending\u2026';
      status.textContent = 'Sending signal\u2026';
      status.className = 'status';

      try {
        var res = await fetch('https://ntfy.sh/' + NTFY_CHANNEL, {
          method: 'POST',
          body: 'inaugurate'
        });
        if (!res.ok) throw new Error('Server returned ' + res.status);
        btn.textContent = 'Sent!';
        status.textContent = '\u2714  Inauguration signal sent!';
        status.className = 'status success';
      } catch (err) {
        status.textContent = '\u2718  Failed \u2014 ' + err.message;
        status.className = 'status error';
        setTimeout(function() {
          btn.classList.remove('sent');
          btn.textContent = 'Inaugurate';
          status.textContent = 'Tap to retry';
          status.className = 'status';
        }, 3000);
      }
    }
  </script>
</body>
</html>
